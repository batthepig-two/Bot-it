<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>GimBot — by batthepig-two</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080b14;
  --surface: #0e1420;
  --surface2: #141b2d;
  --border: rgba(99,179,237,.12);
  --accent: #63b3ed;
  --accent2: #68d391;
  --danger: #fc8181;
  --warn: #f6ad55;
  --text: #e2e8f0;
  --muted: #4a5568;
  --glow: 0 0 20px rgba(99,179,237,.25);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; }

body {
  font-family:'DM Mono',monospace;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* Animated bg grid */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(99,179,237,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,179,237,.03) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
  z-index:0;
}

/* ── SCREENS ── */
.screen { display:none; min-height:100vh; position:relative; z-index:1; }
.screen.active { display:flex; flex-direction:column; }

/* ── SETUP SCREEN ── */
#setup {
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}

.logo {
  font-family:'Syne',sans-serif;
  font-size:3rem;
  font-weight:800;
  letter-spacing:-2px;
  color:#fff;
  text-align:center;
  margin-bottom:4px;
}
.logo span { color:var(--accent); }
.logo-sub {
  font-size:.7rem;
  color:var(--muted);
  text-align:center;
  letter-spacing:.2em;
  text-transform:uppercase;
  margin-bottom:36px;
}

.setup-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px 24px;
  width:100%;
  max-width:420px;
  position:relative;
  overflow:hidden;
}
.setup-card::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}

.field { margin-bottom:18px; }
.field label {
  display:block;
  font-size:.65rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:7px;
}
.field input {
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:1.1rem;
  padding:12px 14px;
  outline:none;
  transition:border-color .2s;
}
.field input:focus { border-color:var(--accent); box-shadow:var(--glow); }

.bot-name-list { display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
.bot-name-row {
  display:flex;
  gap:8px;
  align-items:center;
}
.bot-name-row .bot-num {
  font-size:.7rem;
  color:var(--accent);
  width:24px;
  flex-shrink:0;
}
.bot-name-row input {
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:.9rem;
  padding:9px 12px;
  outline:none;
  transition:border-color .2s;
}
.bot-name-row input:focus { border-color:var(--accent); }

.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-family:'Syne',sans-serif;
  font-size:1rem;
  font-weight:800;
  cursor:pointer;
  letter-spacing:.03em;
  transition:all .15s;
}
.btn-primary {
  background:var(--accent);
  color:#0a0f1e;
  box-shadow:0 4px 20px rgba(99,179,237,.3);
}
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-primary:active { transform:scale(.97); }
.btn-danger { background:var(--danger); color:#0a0f1e; margin-top:10px; }
.btn-sm {
  padding:7px 14px;
  font-size:.72rem;
  border-radius:7px;
  width:auto;
}

/* ── DASHBOARD ── */
#dashboard { padding:0; }

.topbar {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  position:sticky;
  top:0;
  z-index:10;
}
.topbar-title {
  font-family:'Syne',sans-serif;
  font-size:1.1rem;
  font-weight:800;
  color:var(--accent);
}
.topbar-meta { font-size:.65rem; color:var(--muted); }
.topbar-right { display:flex; gap:8px; align-items:center; }

.status-pill {
  padding:4px 10px;
  border-radius:999px;
  font-size:.62rem;
  font-weight:500;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.pill-connecting { background:rgba(246,173,85,.15); color:var(--warn); border:1px solid rgba(246,173,85,.3); }
.pill-active { background:rgba(104,211,145,.15); color:var(--accent2); border:1px solid rgba(104,211,145,.3); }
.pill-error { background:rgba(252,129,129,.15); color:var(--danger); border:1px solid rgba(252,129,129,.3); }

.dash-body {
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Bot tabs */
.bot-tabs {
  display:flex;
  overflow-x:auto;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  padding:0 8px;
}
.bot-tabs::-webkit-scrollbar { height:0; }
.bot-tab {
  padding:10px 16px;
  font-size:.7rem;
  letter-spacing:.06em;
  color:var(--muted);
  cursor:pointer;
  white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:.15s;
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}
.bot-tab .tab-dot {
  width:6px; height:6px;
  border-radius:50%;
  background:var(--muted);
  flex-shrink:0;
}
.bot-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.bot-tab.active .tab-dot { background:var(--accent2); box-shadow:0 0 6px var(--accent2); }
.bot-tab.joined .tab-dot { background:var(--accent2); }
.bot-tab.error .tab-dot { background:var(--danger); }

/* Bot panel */
.bot-panels { flex:1; overflow-y:auto; }
.bot-panel { display:none; padding:14px; }
.bot-panel.active { display:block; }

/* Stats row */
.stats-row {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
}
.stat-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  text-align:center;
}
.stat-val { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:var(--accent); }
.stat-lbl { font-size:.58rem; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }

/* Settings toggles */
.settings-grid {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:14px;
}
.setting-row {
  display:flex;
  align-items:center;
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  gap:10px;
}
.setting-row:last-child { border-bottom:none; }
.setting-info { flex:1; }
.setting-label { font-size:.82rem; color:var(--text); }
.setting-desc { font-size:.62rem; color:var(--muted); margin-top:2px; }

/* Toggle */
.toggle { position:relative; width:40px; height:22px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-track {
  position:absolute;
  inset:0;
  background:var(--muted);
  border-radius:999px;
  cursor:pointer;
  transition:background .2s;
}
.toggle-track::before {
  content:'';
  position:absolute;
  width:16px; height:16px;
  left:3px; top:3px;
  background:#fff;
  border-radius:50%;
  transition:transform .2s;
}
.toggle input:checked + .toggle-track { background:var(--accent); }
.toggle input:checked + .toggle-track::before { transform:translateX(18px); }

/* Delay slider */
.delay-row {
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:14px;
}
.delay-label { font-size:.75rem; color:var(--text); flex:1; }
.delay-val { font-size:.75rem; color:var(--accent); width:40px; text-align:right; }
input[type=range] { accent-color:var(--accent); cursor:pointer; flex:1; }

/* Joystick area */
.control-area {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:14px;
}
.control-title {
  font-size:.65rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.joystick-wrap {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:24px;
}

.joystick-outer {
  width:130px;
  height:130px;
  border-radius:50%;
  background:var(--surface2);
  border:2px solid var(--border);
  position:relative;
  touch-action:none;
  cursor:pointer;
  flex-shrink:0;
}
.joystick-inner {
  position:absolute;
  width:50px;
  height:50px;
  border-radius:50%;
  background:var(--accent);
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  transition:transform .05s;
  box-shadow:0 0 16px rgba(99,179,237,.5);
  pointer-events:none;
}
.joystick-ring {
  position:absolute;
  inset:8px;
  border-radius:50%;
  border:1px solid rgba(99,179,237,.2);
  pointer-events:none;
}

/* WASD buttons */
.wasd {
  display:grid;
  grid-template-columns:repeat(3,40px);
  grid-template-rows:repeat(3,40px);
  gap:4px;
}
.wasd-btn {
  width:40px; height:40px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:'Syne',sans-serif;
  font-size:.9rem;
  font-weight:800;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .1s;
  -webkit-tap-highlight-color:transparent;
}
.wasd-btn:active, .wasd-btn.pressed {
  background:var(--accent);
  color:#0a0f1e;
  transform:scale(.92);
}
.wasd-btn.empty { background:transparent; border-color:transparent; pointer-events:none; }

/* Action buttons */
.action-btns {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:14px;
}
.action-btn {
  padding:10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:'Syne',sans-serif;
  font-size:.78rem;
  font-weight:800;
  cursor:pointer;
  transition:all .15s;
  text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.action-btn:active { background:var(--accent); color:#0a0f1e; transform:scale(.96); }

/* Log box */
.log-box {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  font-size:.68rem;
  max-height:120px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:2px;
}
.log-box::-webkit-scrollbar { width:3px; }
.log-box::-webkit-scrollbar-thumb { background:var(--border); border-radius:999px; }
.log-entry { line-height:1.5; opacity:.8; }
.log-entry.ok { color:var(--accent2); }
.log-entry.err { color:var(--danger); }
.log-entry.info { color:var(--accent); }
.log-entry.warn { color:var(--warn); }

/* Toast */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 20px;
  border-radius:999px;
  font-size:.75rem;
  z-index:1000;
  transition:transform .3s;
  white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* Stop btn */
.stop-btn {
  position:fixed;
  bottom:20px;
  right:16px;
  background:var(--danger);
  color:#0a0f1e;
  border:none;
  border-radius:12px;
  padding:12px 20px;
  font-family:'Syne',sans-serif;
  font-size:.85rem;
  font-weight:800;
  cursor:pointer;
  z-index:100;
  box-shadow:0 4px 20px rgba(252,129,129,.3);
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── SETUP SCREEN ── -->
<div class="screen active" id="setup">
  <div class="logo">GimBot<span>.</span></div>
  <div class="logo-sub">by batthepig-two · github.com/batthepig-two</div>

  <div class="setup-card">
    <div class="field">
      <label>Game Code</label>
      <input type="text" id="game-code" placeholder="000000" maxlength="10" inputmode="numeric"/>
    </div>

    <div class="field">
      <label>Number of Bots</label>
      <input type="number" id="bot-count" value="1" min="1" max="20"/>
    </div>

    <div class="field">
      <label>Bot Names</label>
      <div class="bot-name-list" id="bot-name-list"></div>
    </div>

    <button class="btn btn-primary" id="launch-btn">⚡ Launch Bots</button>
  </div>
</div>

<!-- ── DASHBOARD SCREEN ── -->
<div class="screen" id="dashboard">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="dash-title">GimBot</div>
      <div class="topbar-meta" id="dash-meta">Code: ------</div>
    </div>
    <div class="topbar-right">
      <div class="status-pill pill-connecting" id="global-status">Connecting</div>
    </div>
  </div>

  <div class="dash-body">
    <div class="bot-tabs" id="bot-tabs"></div>
    <div class="bot-panels" id="bot-panels"></div>
  </div>

  <button class="stop-btn" id="stop-btn">✕ Stop All</button>
</div>

<!-- ── FIREBASE SDK (needed for Gimkit auth) ── -->
<script>
// ── STATE ────────────────────────────────────────────────────────────────────
const FIND_INFO_URL  = "https://www.gimkit.com/api/matchmaker/find-info-from-code";
const MATCHMAKER_URL = "https://www.gimkit.com/api/matchmaker/join";
const CLIENT_TYPE    = "Gimkit\u2060\u200d Web Client V3.1";

let bots = [];       // array of bot objects
let activeBotIdx = 0;
let gameCode = "";

// ── UTILS ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function toast(msg, dur = 2500) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── BOT CLASS ─────────────────────────────────────────────────────────────────
class GimBot {
  constructor(name, index) {
    this.name       = name;
    this.index      = index;
    this.status     = "idle";   // idle | connecting | joined | error
    this.ws         = null;
    this.cash       = 0;
    this.answered   = 0;
    this.autoAnswer = true;
    this.aiMove     = false;
    this.answerDelay= 400;
    this.logs       = [];
    this.sessionId  = null;
    this.serverUrl  = null;
    this.roomId     = null;
    this.wsUrl      = null;
    this.aiInterval = null;
    this.currentQuestion = null;
  }

  log(msg, type = "") {
    const ts = new Date().toLocaleTimeString("en",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
    this.logs.push({ ts, msg, type });
    if (this.logs.length > 80) this.logs.shift();
    if (this.index === activeBotIdx) renderLog(this.index);
    updateTab(this.index);
  }

  async connect(code) {
    this.status = "connecting";
    updateTab(this.index);
    this.log("Finding game...", "info");

    try {
      // Step 1: find room
      const infoRes = await fetch(FIND_INFO_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Origin": "https://www.gimkit.com" },
        body: JSON.stringify({ code: String(code) })
      });
      const info = await infoRes.json();
      if (!info.roomId) { this.log("Room not found", "err"); this.status = "error"; updateTab(this.index); return; }
      this.roomId = info.roomId;
      this.log(`Room: ${this.roomId}`, "info");

      // Step 2: matchmaker join
      const intentRes = await fetch(MATCHMAKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Origin": "https://www.gimkit.com" },
        body: JSON.stringify({ roomId: this.roomId, name: this.name, clientType: CLIENT_TYPE })
      });
      const intent = await intentRes.json();
      if (!intent.serverUrl) { this.log("Matchmaker failed", "err"); this.status = "error"; updateTab(this.index); return; }
      this.serverUrl = intent.serverUrl;
      this.roomId    = intent.roomId || this.roomId;
      this.log(`Server: ${this.serverUrl.split("//")[1]}`, "info");

      // Step 3: join by ID
      const joinRes = await fetch(`${this.serverUrl}/matchmake/joinById/${this.roomId}`, {
  method: "POST",
  headers: { "Content-Type": "application/json", "Accept": "application/json", "Origin": "https://www.gimkit.com" }
});
const joinData = await joinRes.json();
this.log(`joinData: ${JSON.stringify(joinData).substring(0, 200)}`, "info");

// Extract sessionId — may be nested
this.sessionId = joinData.sessionId || joinData.session
  || (joinData.room && joinData.room.sessionId)
  || (joinData.seat && joinData.seat.sessionId) || "";

// Extract the real WebSocket URL if present
const rawWsUrl = joinData.wsUrl || joinData.ws || joinData.serverUrl
  || (joinData.room && joinData.room.wsUrl) || null;
if (rawWsUrl) this.wsUrl = rawWsUrl;

this.log(`Session: ${this.sessionId.substring(0,16) || "none"}`, "info");
this.log(`WS URL from API: ${rawWsUrl || "none — will construct"}`, "info");

      // Step 4: WebSocket
      this.openWS();

    } catch(e) {
      this.log(`Error: ${e.message}`, "err");
      this.status = "error";
      updateTab(this.index);
    }
  }

  openWS() {
  // Use the WebSocket URL returned directly by the API if available,
  // otherwise fall back to constructing one from serverUrl
  const wsBase = this.serverUrl.replace("https://","wss://").replace("http://","ws://");
  const urls = this.wsUrl
    ? [ this.wsUrl.includes("sessionId") ? this.wsUrl : `${this.wsUrl}?sessionId=${this.sessionId}` ]
    : [
        `${wsBase}/?sessionId=${this.sessionId}`,
        `${wsBase}/${this.roomId}?sessionId=${this.sessionId}`,
      ];

    const tryUrl = (i) => {
      if (i >= urls.length) {
        this.log("All WS URLs failed", "err");
        this.status = "error";
        updateTab(this.index);
        return;
      }
      this.log(`WS attempt ${i+1}...`, "info");
      const ws = new WebSocket(urls[i]);
      ws.binaryType = "arraybuffer";

      ws.onopen = () => {
        this.ws = ws;
        this.log("WebSocket connected!", "ok");
        this.status = "joined";
        updateTab(this.index);
        updateGlobalStatus();
        if (this.aiMove) this.startAI();
      };

      ws.onmessage = (e) => this.handleMessage(e);
      ws.onerror   = () => tryUrl(i + 1);
      ws.onclose   = (e) => {
        this.log(`Closed (${e.code})`, "warn");
        if (this.status === "joined") this.status = "error";
        updateTab(this.index);
        updateGlobalStatus();
        if (this.aiInterval) { clearInterval(this.aiInterval); this.aiInterval = null; }
      };
    };
    tryUrl(0);
  }

  send(msgType, payload) {
    if (!this.ws || this.ws.readyState !== WebSocket.OPEN) return;
    try {
      const data = JSON.stringify([msgType, payload]);
      this.ws.send(data);
    } catch(e) {}
  }

  sendBinary(type, ...args) {
    if (!this.ws || this.ws.readyState !== WebSocket.OPEN) return;
    // Colyseus raw message format
    const encoded = [type, ...args];
    this.ws.send(new Uint8Array([type]));
  }

  handleMessage(e) {
    let data;
    if (e.data instanceof ArrayBuffer) {
      // Binary Colyseus message
      const arr = new Uint8Array(e.data);
      const msgType = arr[0];
      if (msgType === 2) { // JOIN_ROOM
        this.log("Room joined (binary)", "ok");
        this.status = "joined";
        updateTab(this.index);
      }
      return;
    }
    try { data = JSON.parse(e.data); } catch { return; }

    if (!Array.isArray(data)) return;
    const [type, payload] = data;

    if (type === 0 || type === "join") {
      this.log("Joined room!", "ok");
      this.status = "joined";
      updateTab(this.index);
    }
    if (payload && typeof payload === "object") {
      if (payload.question || payload.currentQuestion) {
        this.handleQuestion(payload.question || payload.currentQuestion);
      }
      if (payload.cash !== undefined)   this.cash = payload.cash;
      if (payload.money !== undefined)  this.cash = payload.money;
      if (payload.coins !== undefined)  this.cash = payload.coins;
    }
    if (type === "question" || type === "newQuestion") {
      this.handleQuestion(payload);
    }
    if (type === "answerResult" || type === "questionResult") {
      if (payload && payload.correct) {
        this.answered++;
        this.cash += payload.earned || payload.cash || 0;
        this.log(`✓ Correct! +${payload.earned || 0} | Cash: ${this.cash}`, "ok");
      } else if (payload && payload.correct === false) {
        this.log("✗ Wrong", "err");
      }
    }
    if (this.index === activeBotIdx) renderStats(this.index);
  }

  handleQuestion(q) {
    if (!q) return;
    this.currentQuestion = q;
    const text = q.question || q.text || "";
    const correct = q.correctAnswer || q.correct;
    this.log(`Q: ${text.substring(0,40)}...`, "warn");
    if (this.autoAnswer && correct) {
      setTimeout(() => {
        this.send("action", { type: "answer", answer: correct, timeTaken: this.answerDelay });
        this.log(`→ Answered: ${String(correct).substring(0,20)}`, "info");
      }, this.answerDelay);
    }
  }

  move(direction) {
    this.send("action", { type: "move", direction });
    this.send("action", { type: "movement", direction });
    // Also try Gimkit's specific move format
    this.send("move", { direction });
  }

  interact() { this.send("action", { type: "interact" }); }
  fish()     { this.send("action", { type: "fish" }); }
  sell()     { this.send("action", { type: "sell" }); }
  attack()   { this.send("action", { type: "attack" }); }

  startAI() {
    const dirs = ["up","down","left","right"];
    this.aiInterval = setInterval(() => {
      if (this.ws && this.ws.readyState === WebSocket.OPEN) {
        this.move(dirs[Math.floor(Math.random() * dirs.length)]);
      }
    }, 800 + Math.random() * 400);
  }

  stopAI() {
    if (this.aiInterval) { clearInterval(this.aiInterval); this.aiInterval = null; }
  }

  close() {
    this.stopAI();
    if (this.ws) { try { this.ws.close(); } catch {} }
    this.status = "idle";
  }
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function renderNameInputs() {
  const count = parseInt($("bot-count").value) || 1;
  const list  = $("bot-name-list");
  const existing = list.querySelectorAll("input");
  const oldVals  = Array.from(existing).map(i => i.value);
  list.innerHTML = "";
  for (let i = 0; i < Math.min(count, 20); i++) {
    const row = document.createElement("div");
    row.className = "bot-name-row";
    row.innerHTML = `<span class="bot-num">#${i+1}</span><input type="text" placeholder="Bot ${i+1}" value="${oldVals[i] || "Bot "+(i+1)}"/>`;
    list.appendChild(row);
  }
}
$("bot-count").addEventListener("input", renderNameInputs);
renderNameInputs();

$("launch-btn").addEventListener("click", async () => {
  gameCode = $("game-code").value.trim();
  if (!gameCode) { toast("Enter a game code!"); return; }
  const count = parseInt($("bot-count").value) || 1;
  const nameInputs = $("bot-name-list").querySelectorAll("input");
  const names = Array.from(nameInputs).map((inp, i) => inp.value.trim() || `Bot ${i+1}`);

  bots = names.map((n, i) => new GimBot(n, i));
  buildDashboard();
  showDash();

  // Connect bots with stagger
  for (let i = 0; i < bots.length; i++) {
    bots[i].connect(gameCode);
    await sleep(300);
  }
});

// ── DASHBOARD BUILD ───────────────────────────────────────────────────────────
function buildDashboard() {
  $("dash-title").textContent = "GimBot";
  $("dash-meta").textContent  = `Code: ${gameCode} · ${bots.length} bot${bots.length>1?"s":""}`;

  const tabBar  = $("bot-tabs");
  const panels  = $("bot-panels");
  tabBar.innerHTML = "";
  panels.innerHTML = "";

  bots.forEach((bot, i) => {
    // Tab
    const tab = document.createElement("div");
    tab.className = "bot-tab" + (i === 0 ? " active" : "");
    tab.id = `tab-${i}`;
    tab.innerHTML = `<span class="tab-dot"></span>${bot.name}`;
    tab.onclick = () => selectBot(i);
    tabBar.appendChild(tab);

    // Panel
    const panel = document.createElement("div");
    panel.className = "bot-panel" + (i === 0 ? " active" : "");
    panel.id = `panel-${i}`;
    panel.innerHTML = buildPanelHTML(bot, i);
    panels.appendChild(panel);

    // Wire controls after DOM insert
    wirePanel(bot, i);
  });
}

function buildPanelHTML(bot, i) {
  return `
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="stat-cash-${i}">0</div>
      <div class="stat-lbl">Cash</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-ans-${i}">0</div>
      <div class="stat-lbl">Answered</div>
    </div>
    <div class="stat-box">
      <div class="stat-val stat-status" id="stat-status-${i}">—</div>
      <div class="stat-lbl">Status</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-grid">
    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-label">Auto Answer</div>
        <div class="setting-desc">Picks correct answer automatically</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="aa-${i}" ${bot.autoAnswer?"checked":""}>
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-label">AI Movement</div>
        <div class="setting-desc">Bot wanders randomly</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="ai-${i}" ${bot.aiMove?"checked":""}>
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <!-- Answer delay -->
  <div class="delay-row">
    <span class="delay-label">Answer Delay</span>
    <input type="range" id="delay-${i}" min="0" max="3000" step="100" value="${bot.answerDelay}"/>
    <span class="delay-val" id="delay-val-${i}">${(bot.answerDelay/1000).toFixed(1)}s</span>
  </div>

  <!-- Joystick + WASD -->
  <div class="control-area">
    <div class="control-title">
      <span>Movement</span>
      <span style="color:var(--accent2);font-size:.6rem;">TAP OR DRAG</span>
    </div>
    <div class="joystick-wrap">
      <!-- Joystick -->
      <div class="joystick-outer" id="joy-${i}">
        <div class="joystick-ring"></div>
        <div class="joystick-inner" id="joy-knob-${i}"></div>
      </div>
      <!-- WASD -->
      <div class="wasd">
        <div class="wasd-btn empty"></div>
        <div class="wasd-btn" id="btn-up-${i}">↑</div>
        <div class="wasd-btn empty"></div>
        <div class="wasd-btn" id="btn-left-${i}">←</div>
        <div class="wasd-btn" id="btn-down-${i}">↓</div>
        <div class="wasd-btn" id="btn-right-${i}">→</div>
      </div>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="action-btns">
    <div class="action-btn" id="act-fish-${i}">🎣 Fish</div>
    <div class="action-btn" id="act-sell-${i}">💰 Sell</div>
    <div class="action-btn" id="act-attack-${i}">⚔️ Attack</div>
    <div class="action-btn" id="act-interact-${i}">🔘 Interact</div>
  </div>

  <!-- Log -->
  <div class="log-box" id="log-${i}"></div>
  `;
}

function wirePanel(bot, i) {
  // Auto answer toggle
  $(`aa-${i}`).onchange = function() {
    bot.autoAnswer = this.checked;
    toast(`${bot.name}: Auto Answer ${this.checked?"ON":"OFF"}`);
  };

  // AI move toggle
  $(`ai-${i}`).onchange = function() {
    bot.aiMove = this.checked;
    if (this.checked) bot.startAI();
    else bot.stopAI();
    toast(`${bot.name}: AI Move ${this.checked?"ON":"OFF"}`);
  };

  // Delay slider
  $(`delay-${i}`).oninput = function() {
    bot.answerDelay = parseInt(this.value);
    $(`delay-val-${i}`).textContent = (bot.answerDelay/1000).toFixed(1)+"s";
  };

  // WASD buttons
  const dirs = {
    [`btn-up-${i}`]:    "up",
    [`btn-down-${i}`]:  "down",
    [`btn-left-${i}`]:  "left",
    [`btn-right-${i}`]: "right",
  };
  Object.entries(dirs).forEach(([id, dir]) => {
    const el = $(id);
    const send = () => bot.move(dir);
    el.addEventListener("touchstart", e => { e.preventDefault(); el.classList.add("pressed"); send(); }, {passive:false});
    el.addEventListener("touchend",   () => el.classList.remove("pressed"));
    el.addEventListener("mousedown",  () => { el.classList.add("pressed"); send(); });
    el.addEventListener("mouseup",    () => el.classList.remove("pressed"));
  });

  // Action buttons
  $(`act-fish-${i}`).addEventListener("click", () => { bot.fish(); toast(`${bot.name}: Fishing!`); });
  $(`act-sell-${i}`).addEventListener("click", () => { bot.sell(); toast(`${bot.name}: Selling!`); });
  $(`act-attack-${i}`).addEventListener("click", () => { bot.attack(); toast(`${bot.name}: Attack!`); });
  $(`act-interact-${i}`).addEventListener("click", () => { bot.interact(); toast(`${bot.name}: Interact!`); });

  // Joystick
  wireJoystick(bot, i);
}

// ── JOYSTICK ──────────────────────────────────────────────────────────────────
function wireJoystick(bot, i) {
  const outer = $(`joy-${i}`);
  const knob  = $(`joy-knob-${i}`);
  if (!outer || !knob) return;

  const R = 40; // max radius
  let active = false;
  let moveInterval = null;
  let lastDir = null;

  function getCenter() {
    const rect = outer.getBoundingClientRect();
    return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  }

  function getDirection(dx, dy) {
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return null;
    if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? "right" : "left";
    return dy > 0 ? "down" : "up";
  }

  function update(clientX, clientY) {
    const center = getCenter();
    let dx = clientX - center.x;
    let dy = clientY - center.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > R) { dx = dx/dist*R; dy = dy/dist*R; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    const dir = getDirection(dx, dy);
    if (dir !== lastDir) {
      lastDir = dir;
      if (dir) bot.move(dir);
    }
  }

  function startMove(clientX, clientY) {
    active = true;
    update(clientX, clientY);
    moveInterval = setInterval(() => { if (lastDir) bot.move(lastDir); }, 200);
  }

  function endMove() {
    active = false;
    lastDir = null;
    knob.style.transform = "translate(-50%, -50%)";
    if (moveInterval) { clearInterval(moveInterval); moveInterval = null; }
  }

  outer.addEventListener("touchstart", e => {
    e.preventDefault();
    startMove(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
  outer.addEventListener("touchmove", e => {
    e.preventDefault();
    if (active) update(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
  outer.addEventListener("touchend", () => endMove());
  outer.addEventListener("mousedown", e => startMove(e.clientX, e.clientY));
  document.addEventListener("mousemove", e => { if (active) update(e.clientX, e.clientY); });
  document.addEventListener("mouseup", () => { if (active) endMove(); });
}

// ── RENDER UPDATES ────────────────────────────────────────────────────────────
function renderStats(i) {
  const bot = bots[i];
  if (!bot) return;
  const cash = $(`stat-cash-${i}`);
  const ans  = $(`stat-ans-${i}`);
  const stat = $(`stat-status-${i}`);
  if (cash) cash.textContent = bot.cash;
  if (ans)  ans.textContent  = bot.answered;
  if (stat) {
    const map = { idle:"—", connecting:"···", joined:"OK", error:"ERR" };
    stat.textContent = map[bot.status] || "—";
    stat.style.color = bot.status === "joined" ? "var(--accent2)" : bot.status === "error" ? "var(--danger)" : "var(--muted)";
  }
}

function renderLog(i) {
  const box = $(`log-${i}`);
  if (!box) return;
  box.innerHTML = "";
  bots[i].logs.slice(-30).forEach(entry => {
    const el = document.createElement("div");
    el.className = `log-entry ${entry.type}`;
    el.textContent = `${entry.ts} ${entry.msg}`;
    box.appendChild(el);
  });
  box.scrollTop = box.scrollHeight;
}

function updateTab(i) {
  const tab = $(`tab-${i}`);
  if (!tab) return;
  const bot = bots[i];
  tab.className = `bot-tab${i===activeBotIdx?" active":""} ${bot.status==="joined"?"joined":bot.status==="error"?"error":""}`;
  renderStats(i);
}

function updateGlobalStatus() {
  const joined = bots.filter(b => b.status === "joined").length;
  const total  = bots.length;
  const pill   = $("global-status");
  if (joined === total) {
    pill.textContent = `${joined}/${total} Joined`;
    pill.className = "status-pill pill-active";
  } else if (joined > 0) {
    pill.textContent = `${joined}/${total} Joined`;
    pill.className = "status-pill pill-connecting";
  } else {
    pill.textContent = "Connecting...";
    pill.className = "status-pill pill-connecting";
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function selectBot(i) {
  activeBotIdx = i;
  document.querySelectorAll(".bot-tab").forEach((t,j) => {
    t.className = `bot-tab${j===i?" active":""} ${bots[j].status==="joined"?"joined":bots[j].status==="error"?"error":""}`;
  });
  document.querySelectorAll(".bot-panel").forEach((p,j) => {
    p.className = "bot-panel" + (j===i?" active":"");
  });
  renderLog(i);
  renderStats(i);
}

function showDash() {
  $("setup").classList.remove("active");
  $("dashboard").classList.add("active");
}

function showSetup() {
  $("dashboard").classList.remove("active");
  $("setup").classList.add("active");
}

$("stop-btn").addEventListener("click", () => {
  bots.forEach(b => b.close());
  bots = [];
  showSetup();
  toast("All bots stopped");
});

// Refresh stats periodically
setInterval(() => {
  if (bots.length > 0) {
    renderStats(activeBotIdx);
    updateGlobalStatus();
  }
}, 1000);
</script>
